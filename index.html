<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ClassLM — Cliente</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 20px; }
      textarea { width: 100%; max-width: 800px; }
      #response { white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 6px; margin-top: 12px; max-width: 800px; }
      button { margin-top: 8px; padding: 8px 12px; }
    </style>
  </head>
  <body>
    <h1>ClassLM — Cliente</h1>
    <p>Escribe un prompt y pulsa <strong>Enviar</strong> para llamar al endpoint FastAPI <code>/LM/{promt}</code>.</p>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" rows="5" placeholder="Escribe aquí tu prompt..."></textarea>
    <br />
    <button id="send">Enviar</button>

    <h2>Respuesta</h2>
    <div id="response">Esperando petición...</div>

    <script src="static/app.js"></script>
  </body>
</html>
